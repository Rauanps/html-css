<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Boas vindas!</h1>
        <p>Vamos personalizar sua saudação usando javascript</p>
        <div class="saudacao" id="saudacaoMensagem">Olá, Visitante</div>
         <button onClick="personalizar()">Personalizar</button>

    </div>
    <script>
        function personalizar() {
            document.getElementById("saudacaoMensagem").textContent = "Olá, Rauan, tudo bem?"
        }
    </script>
</body>
</html>
