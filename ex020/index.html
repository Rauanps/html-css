<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         div {
            color: red;
         }

         div > p {
            display:none
        }

        div:hover > p {
            display: block;
            background-color: aquamarine;
            width: 300px;
        }


        .dtLocal:active {
            color: aquamarine;
        }

        .dtLocal::after {
            content: "Data Local";
        }
    </style>
</head>
<body>
    <h1>Testando pseudo classes</h1>
    <div>passe o mouse aqui
        <p>Texto escondido</p>
    </div>
    <input class="dtLocal" type="datetime-local" name="Data" id="dataLocal">
    <input type="checkbox" name="" id="">
    <input type="email" name="" id="">
    <input type="image" src="" alt="">
    <input type="password" name="" id="">
    <input type="radio" name="" id="">
    <input type="radio" name="" id="">
</body>
</html>
